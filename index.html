<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ray’s Candy Clicker</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Bucket image */
.bucket {
  width: 260px;
  cursor: pointer;
  transition: transform 0.1s ease, filter 0.1s ease;
}

/* Press animation */
.bucket:active {
  transform: scale(0.85) translateY(10px);
  filter: brightness(1.2);
}
</style>
</head>

<body>

<img src="images/bucket.png" class="bucket">

</body>
</html>
