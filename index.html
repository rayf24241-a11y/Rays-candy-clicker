<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ray's Candy Clicker</title>

<style>
body {
  margin: 0;
  background: black;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
}

/* layout */
.game {
  text-align: center;
}

/* candy-style counter */
.counter {
  font-size: 50px;
  margin-bottom: 20px;
  font-weight: bold;
  color: #ff8fcf;
  background: #ff5fb5;
  padding: 10px 25px;
  border-radius: 20px;
  border: 4px solid #ffc6e8;
  box-shadow: 0 6px 0 #d94a93;
  text-shadow: 1px 1px 0 rgba(255,255,255,0.4);
}

/* bucket */
.bucket {
  width: 260px;
  cursor: pointer;
  transition: 0.1s;
}

.bucket:active {
  transform: scale(0.85) translateY(10px);
}

/* candy image */
.candy {
  position: fixed;
  pointer-events: none;
  z-index: 1;
  width: 50px;
}
</style>
</head>

<body>

<div class="game">
  <div class="counter" id="counter">0</div>
  <img src="images/bucket.png" class="bucket" id="bucket">
</div>

<script>
let count = 0;

const counter = document.getElementById("counter");
const bucket = document.getElementById("bucket");

function getFarSpawn(bucketRect) {
  const minDist = 200;
  let x, y, dx, dy, dist;

  do {
    x = Math.random() * (window.innerWidth - 80);
    y = Math.random() * (window.innerHeight - 80);

    const bx = bucketRect.left + bucketRect.width / 2;
    const by = bucketRect.top + bucketRect.height / 2;

    dx = x - bx;
    dy = y - by;
    dist = Math.sqrt(dx * dx + dy * dy);

  } while (dist < minDist);

  return { x, y };
}

function spawnCandy() {
  const candy = document.createElement("img");
  candy.src = "images/bucketcandy.png";
  candy.className = "candy";

  const bucketRect = bucket.getBoundingClientRect();
  const spawn = getFarSpawn(bucketRect);

  candy.style.left = spawn.x + "px";
  candy.style.top = spawn.y + "px";

  document.body.appendChild(candy);

  requestAnimationFrame(() => {
    const rect = bucket.getBoundingClientRect();

    const targetX = rect.left + rect.width / 2 - 25;
    const targetY = rect.top + rect.height / 2 - 25;

    const moveX = targetX - spawn.x;
    const moveY = targetY - spawn.y;

    candy.animate([
      { transform: "translate(0,0) scale(1)", opacity: 1 },
      { transform: `translate(${moveX}px, ${moveY}px) scale(0.2) rotate(360deg)`, opacity: 0 }
    ], {
      duration: 700,
      easing: "ease-out",
      fill: "forwards"
    });

    setTimeout(() => candy.remove(), 700);
  });
}

bucket.addEventListener("click", () => {
  count++;
  counter.textContent = count;
  spawnCandy();
});
</script>

</body>
</html>
