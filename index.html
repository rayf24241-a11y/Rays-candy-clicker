<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ray's Candy Clicker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: black;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }

    .main {
      height: 100vh;
      margin-right: 250px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .game {
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .counter {
      font-size: 48px;
      margin-bottom: 10px;
      font-weight: bold;
      color: #ffb6d9;
      background: #ff67b7;
      padding: 10px 24px;
      border-radius: 18px;
      border: 4px solid #ffd3ea;
      box-shadow: 0 6px 0 #d94a93;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.35);
      display: inline-block;
    }

    .per-click {
      margin-bottom: 20px;
      font-size: 20px;
      color: #ffd8ec;
    }

    .bucket {
      width: 270px;
      cursor: pointer;
      transition: transform 0.1s ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    .bucket:active {
      transform: scale(0.88) translateY(10px);
    }

    .candy {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      width: 50px;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* RIGHT SHOP */
    .shop {
      position: fixed;
      top: 0;
      right: 0;
      width: 250px;
      height: 100vh;
      background: linear-gradient(180deg, #1f1f1f, #111);
      border-left: 4px solid #ffb347;
      padding: 14px;
      overflow-y: auto;
      z-index: 20;
    }

    .shop-title {
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      color: #ffbf5f;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(255, 179, 71, 0.35);
    }

    .shop-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #2a2a2a;
      border: 2px solid #3a3a3a;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      position: relative;
      transition: transform 0.08s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .shop-item:hover {
      background: #353535;
      border-color: #ffb347;
      transform: scale(1.02);
    }

    .shop-item:active {
      transform: scale(0.98);
    }

    .shop-item.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .shop-item.disabled:hover {
      transform: none;
      background: #2a2a2a;
      border-color: #3a3a3a;
    }

    .item-icon-wrap {
      position: relative;
      width: 58px;
      height: 58px;
      flex-shrink: 0;
    }

    .cookie-icon {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #d9995a 0%, #b96e36 70%);
      border: 3px solid #84471d;
      position: relative;
      box-shadow: inset -3px -3px 0 rgba(0,0,0,0.18);
    }

    .chip {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #5d3216;
      border-radius: 50%;
    }

    .tooltip {
      position: absolute;
      left: -2px;
      bottom: 68px;
      background: #fff0c6;
      color: #111;
      font-size: 13px;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 10px;
      white-space: nowrap;
      display: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
      z-index: 30;
    }

    .item-icon-wrap:hover .tooltip {
      display: block;
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-size: 20px;
      font-weight: bold;
      color: #ffe0a6;
    }

    .item-cost {
      font-size: 15px;
      color: #d6d6d6;
      margin-top: 4px;
    }

    .owned {
      margin-top: 4px;
      font-size: 13px;
      color: #9fd89f;
    }
  </style>
</head>
<body>

  <div class="main">
    <div class="game">
      <div class="counter" id="counter">0</div>
      <div class="per-click" id="perClickText">Per click: 1</div>
      <img src="images/bucket.png" class="bucket" id="bucket" alt="Candy Bucket" />
    </div>
  </div>

  <div class="shop">
    <div class="shop-title">Shop</div>

    <div class="shop-item" id="cookieItem">
      <div class="item-icon-wrap">
        <div class="tooltip">+1 click</div>
        <div class="cookie-icon">
          <div class="chip" style="left: 10px; top: 12px;"></div>
          <div class="chip" style="left: 30px; top: 9px;"></div>
          <div class="chip" style="left: 18px; top: 25px;"></div>
          <div class="chip" style="left: 37px; top: 29px;"></div>
          <div class="chip" style="left: 12px; top: 39px;"></div>
        </div>
      </div>

      <div class="item-info">
        <div class="item-name">Cookie</div>
        <div class="item-cost" id="cookieCostText">10 Clicks</div>
        <div class="owned" id="cookieOwnedText">Owned: 0</div>
      </div>
    </div>
  </div>

  <script>
    let count = 0;
    let clicksPerTap = 1;
    let cookieOwned = 0;
    let cookieCost = 10;

    const counter = document.getElementById("counter");
    const perClickText = document.getElementById("perClickText");
    const bucket = document.getElementById("bucket");

    const cookieItem = document.getElementById("cookieItem");
    const cookieCostText = document.getElementById("cookieCostText");
    const cookieOwnedText = document.getElementById("cookieOwnedText");

    function updateUI() {
      counter.textContent = count;
      perClickText.textContent = "Per click: " + clicksPerTap;
      cookieCostText.textContent = cookieCost + " Clicks";
      cookieOwnedText.textContent = "Owned: " + cookieOwned;

      if (count >= cookieCost) {
        cookieItem.classList.remove("disabled");
      } else {
        cookieItem.classList.add("disabled");
      }
    }

    function getFarSpawn(bucketRect) {
      const minDist = 200;
      let x, y, dx, dy, dist;

      do {
        x = Math.random() * (window.innerWidth - 80);
        y = Math.random() * (window.innerHeight - 80);

        const bx = bucketRect.left + bucketRect.width / 2;
        const by = bucketRect.top + bucketRect.height / 2;

        dx = x - bx;
        dy = y - by;
        dist = Math.sqrt(dx * dx + dy * dy);
      } while (dist < minDist);

      return { x, y };
    }

    function spawnCandy() {
      const candy = document.createElement("img");
      candy.src = "images/bucketcandy.png";
      candy.className = "candy";

      const bucketRect = bucket.getBoundingClientRect();
      const spawn = getFarSpawn(bucketRect);

      candy.style.left = spawn.x + "px";
      candy.style.top = spawn.y + "px";

      document.body.appendChild(candy);

      requestAnimationFrame(() => {
        const rect = bucket.getBoundingClientRect();
        const targetX = rect.left + rect.width / 2 - 25;
        const targetY = rect.top + rect.height / 2 - 25;

        const moveX = targetX - spawn.x;
        const moveY = targetY - spawn.y;

        candy.animate(
          [
            { transform: "translate(0,0) scale(1) rotate(0deg)", opacity: 1 },
            { transform: `translate(${moveX}px, ${moveY}px) scale(0.2) rotate(360deg)`, opacity: 0 }
          ],
          {
            duration: 700,
            easing: "ease-out",
            fill: "forwards"
          }
        );

        setTimeout(() => candy.remove(), 700);
      });
    }

    bucket.addEventListener("click", () => {
      count += clicksPerTap;
      spawnCandy();
      updateUI();
    });

    cookieItem.addEventListener("click", () => {
      if (count < cookieCost) return;

      count -= cookieCost;
      cookieOwned += 1;
      clicksPerTap += 1;
      cookieCost = Math.floor(cookieCost * 1.5);

      updateUI();
    });

    updateUI();
  </script>
</body>
</html>
