<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ray's Candy Clicker</title>

<style>
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-user-select: none;
  -webkit-user-drag: none;
}

body {
  margin: 0;
  display: flex;
  height: 100vh;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  overflow: hidden;
}

/* LEFT SIDE */
.left {
  width: calc(100% - 300px);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.counter {
  font-size: 50px;
  margin-bottom: 10px;
  color: #ffb6d9;
  background: #ff5fb5;
  padding: 10px 25px;
  border-radius: 20px;
  border: 4px solid #ffd3ea;
  box-shadow: 0 6px 0 #d94a93;
}

.per-click {
  margin-bottom: 20px;
  color: #ffd8ec;
}

/* BUCKET */
.bucket {
  width: 280px;
  cursor: pointer;
  transition: 0.1s;
}

.bucket:active {
  transform: scale(0.9) translateY(10px);
}

/* CANDY */
.candy {
  position: fixed;
  width: 50px;
  pointer-events: none;
}

/* RIGHT SHOP */
.shop {
  width: 300px;
  background: #1a1a1a;
  border-left: 4px solid #ffb347;
  padding: 10px;
  overflow-y: auto;
}

.shop-title {
  font-size: 28px;
  text-align: center;
  color: #ffb347;
  margin-bottom: 10px;
}

/* SHOP ITEM */
.shop-item {
  display: flex;
  gap: 10px;
  background: #2a2a2a;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  margin-bottom: 10px;
  transition: 0.1s;
}

.shop-item:hover {
  background: #3a3a3a;
  transform: scale(1.02);
}

.shop-item.disabled {
  opacity: 0.5;
}

/* IMAGE */
.item-icon {
  width: 60px;
  height: 60px;
  border-radius: 10px;
  object-fit: cover;
}

/* TEXT */
.item-name {
  font-weight: bold;
}

.item-cost {
  font-size: 14px;
  color: #ccc;
}

.item-owned {
  font-size: 12px;
  color: #9f9;
}

/* TOOLTIP */
.tooltip {
  position: absolute;
  background: #fff0c6;
  color: black;
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 12px;
  display: none;
}

.shop-item:hover .tooltip {
  display: block;
}
</style>
</head>

<body>

<div class="left">
  <div class="counter" id="counter">0</div>
  <div class="per-click" id="perClickText">Per click: 1</div>
  <img src="images/bucket.png" class="bucket" id="bucket">
</div>

<div class="shop">
  <div class="shop-title">Shop</div>

  <div class="shop-item" id="cookieItem">
    <img src="shop-images/shopcookie.png" class="item-icon">

    <div>
      <div class="item-name">Cookie</div>
      <div class="item-cost" id="cookieCostText">10 Clicks</div>
      <div class="item-owned" id="cookieOwnedText">Owned: 0</div>
    </div>

    <div class="tooltip">+1 click</div>
  </div>
</div>

<script>
let count = 0;
let clicksPerTap = 1;
let cookieOwned = 0;
let cookieCost = 10;

const counter = document.getElementById("counter");
const perClickText = document.getElementById("perClickText");
const bucket = document.getElementById("bucket");

const cookieItem = document.getElementById("cookieItem");
const cookieCostText = document.getElementById("cookieCostText");
const cookieOwnedText = document.getElementById("cookieOwnedText");

function updateUI() {
  counter.textContent = count;
  perClickText.textContent = "Per click: " + clicksPerTap;
  cookieCostText.textContent = cookieCost + " Clicks";
  cookieOwnedText.textContent = "Owned: " + cookieOwned;

  if (count >= cookieCost) {
    cookieItem.classList.remove("disabled");
  } else {
    cookieItem.classList.add("disabled");
  }
}

/* SPAWN CANDY */
function spawnCandy() {
  const candy = document.createElement("img");
  candy.src = "images/bucketcandy.png";
  candy.className = "candy";

  const startX = Math.random() * window.innerWidth;
  const startY = Math.random() * window.innerHeight;

  candy.style.left = startX + "px";
  candy.style.top = startY + "px";

  document.body.appendChild(candy);

  const rect = bucket.getBoundingClientRect();
  const targetX = rect.left + rect.width / 2;
  const targetY = rect.top + rect.height / 2;

  candy.animate([
    { transform: "translate(0,0)" },
    { transform: `translate(${targetX - startX}px, ${targetY - startY}px) scale(0.2)` }
  ], {
    duration: 700,
    easing: "ease-out"
  });

  setTimeout(() => candy.remove(), 700);
}

/* CLICK */
bucket.addEventListener("click", () => {
  count += clicksPerTap;
  spawnCandy();
  updateUI();
});

/* BUY COOKIE */
cookieItem.addEventListener("click", () => {
  if (count < cookieCost) return;

  count -= cookieCost;
  cookieOwned++;
  clicksPerTap++;

  cookieCost = Math.floor(cookieCost * 1.5);

  updateUI();
});

updateUI();
</script>

</body>
</html>
