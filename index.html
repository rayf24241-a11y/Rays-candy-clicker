<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ray's Candy Clicker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
      position: relative;
    }

    .game {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      position: relative;
      z-index: 2;
    }

    .counter {
      font-size: 52px;
      font-weight: 900;
      color: #ffb3d9;
      letter-spacing: 2px;
      padding: 8px 20px;
      border-radius: 20px;
      background: linear-gradient(180deg, #ff6fb5, #ff94c9);
      border: 4px solid #ffc6e3;
      box-shadow: 0 6px 0 #d94a93;
      text-shadow:
        2px 2px 0 #ffffff66,
        -2px -2px 0 #c94a86;
      user-select: none;
    }

    .bucket {
      width: 280px;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.08s ease;
      user-select: none;
      -webkit-user-drag: none;
      position: relative;
      z-index: 3;
    }

    .bucket:active {
      transform: scale(0.9) translateY(8px);
      filter: brightness(1.04);
    }

    .candy {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="counter" id="counter">0</div>
    <img src="images/bucket.png" class="bucket" id="bucket" alt="Candy Bucket" />
  </div>

  <script>
    let clicks = 0;

    const counter = document.getElementById("counter");
    const bucket = document.getElementById("bucket");

    function spawnCandy() {
      const candy = document.createElement("img");
      candy.src = "images/bucketcandy.png";
      candy.className = "candy";

      const size = Math.random() * 18 + 32;
      candy.style.width = size + "px";

      const startX = Math.random() * (window.innerWidth - 80);
      const startY = Math.random() * (window.innerHeight - 80);

      candy.style.left = startX + "px";
      candy.style.top = startY + "px";

      document.body.appendChild(candy);

      requestAnimationFrame(() => {
        const rect = bucket.getBoundingClientRect();
        const candyRect = candy.getBoundingClientRect();

        const targetX = rect.left + rect.width / 2 - candyRect.width / 2;
        const targetY = rect.top + rect.height / 2 - candyRect.height / 2;

        const moveX = targetX - startX;
        const moveY = targetY - startY;

        candy.animate(
          [
            {
              transform: "translate(0px, 0px) scale(1) rotate(0deg)",
              opacity: 1
            },
            {
              transform: `translate(${moveX}px, ${moveY}px) scale(0.25) rotate(360deg)`,
              opacity: 0.1
            }
          ],
          {
            duration: 650,
            easing: "ease-out",
            fill: "forwards"
          }
        );

        setTimeout(() => {
          candy.remove();
        }, 650);
      });
    }

    bucket.addEventListener("click", () => {
      clicks += 1;
      counter.textContent = clicks;
      spawnCandy();
    });
  </script>
</body>
</html>
