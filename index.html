<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ray's Candy Clicker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
      position: relative;
    }

    .game {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      position: relative;
      z-index: 2;
    }

    .counter {
      font-size: 52px;
      font-weight: 900;
      color: #ffe3f1;
      letter-spacing: 2px;
      padding: 10px 24px;
      border-radius: 18px;
      background: linear-gradient(180deg, #ff7bbb, #ff9bcb);
      border: 4px solid #ffd2e8;
      box-shadow: 0 6px 0 #d95b97;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.35);
      user-select: none;
    }

    .bucket {
      width: 280px;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.08s ease;
      user-select: none;
      -webkit-user-drag: none;
      position: relative;
      z-index: 3;
    }

    .bucket:active {
      transform: scale(0.9) translateY(8px);
      filter: brightness(1.04);
    }

    .candy {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="counter" id="counter">0</div>
    <img src="images/bucket.png" class="bucket" id="bucket" alt="Candy Bucket" />
  </div>

  <script>
    let clicks = 0;

    const counter = document.getElementById("counter");
    const bucket = document.getElementById("bucket");

    function getFarSpawnPosition(bucketRect) {
      const minDistance = 220;
      let x, y, dx, dy, distance;

      do {
        x = Math.random() * (window.innerWidth - 80);
        y = Math.random() * (window.innerHeight - 80);

        const bucketCenterX = bucketRect.left + bucketRect.width / 2;
        const bucketCenterY = bucketRect.top + bucketRect.height / 2;

        dx = x - bucketCenterX;
        dy = y - bucketCenterY;
        distance = Math.sqrt(dx * dx + dy * dy);
      } while (distance < minDistance);

      return { x, y };
    }

    function spawnCandy() {
      const candy = document.createElement("img");
      candy.src = "images/bucketcandy_no_bg.png";
      candy.className = "candy";

      const size = Math.random() * 18 + 34;
      candy.style.width = size + "px";

      const bucketRect = bucket.getBoundingClientRect();
      const spawn = getFarSpawnPosition(bucketRect);

      candy.style.left = spawn.x + "px";
      candy.style.top = spawn.y + "px";

      document.body.appendChild(candy);

      requestAnimationFrame(() => {
        const rect = bucket.getBoundingClientRect();
        const candyRect = candy.getBoundingClientRect();

        const targetX = rect.left + rect.width / 2 - candyRect.width / 2;
        const targetY = rect.top + rect.height / 2 - candyRect.height / 2;

        const moveX = targetX - spawn.x;
        const moveY = targetY - spawn.y;

        candy.animate(
          [
            {
              transform: "translate(0px, 0px) scale(1) rotate(0deg)",
              opacity: 1
            },
            {
              transform: `translate(${moveX}px, ${moveY}px) scale(0.2) rotate(540deg)`,
              opacity: 0.05
            }
          ],
          {
            duration: 750,
            easing: "cubic-bezier(0.22, 1, 0.36, 1)",
            fill: "forwards"
          }
        );

        setTimeout(() => {
          candy.remove();
        }, 760);
      });
    }

    bucket.addEventListener("click", () => {
      clicks += 1;
      counter.textContent = clicks;
      spawnCandy();
    });
  </script>
</body>
</html>
