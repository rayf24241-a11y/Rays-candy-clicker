<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ray's Candy Clicker</title>

<style>
body {
  margin: 0;
  background: black;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
}

/* layout */
.game {
  text-align: center;
}

/* counter */
.counter {
  color: #00ff88;
  font-size: 50px;
  margin-bottom: 20px;
  text-shadow: 0 0 15px #00ff88;
}

/* bucket image */
.bucket {
  width: 260px;
  cursor: pointer;
  transition: 0.1s;
}

.bucket:active {
  transform: scale(0.85) translateY(10px);
}

/* candy */
.candy {
  position: fixed;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  z-index: 1;
}
</style>
</head>

<body>

<div class="game">
  <div class="counter" id="counter">0</div>
  <img src="images/bucket.png" class="bucket" id="bucket">
</div>

<script>
let count = 0;

const counter = document.getElementById("counter");
const bucket = document.getElementById("bucket");

function spawnCandy() {
  const candy = document.createElement("div");
  candy.className = "candy";

  // random color
  const colors = ["red","yellow","blue","green","purple","orange","pink"];
  candy.style.background = colors[Math.floor(Math.random()*colors.length)];

  // random start position
  const startX = Math.random() * window.innerWidth;
  const startY = Math.random() * window.innerHeight;

  candy.style.left = startX + "px";
  candy.style.top = startY + "px";

  document.body.appendChild(candy);

  // get bucket position
  const rect = bucket.getBoundingClientRect();
  const targetX = rect.left + rect.width / 2;
  const targetY = rect.top + rect.height / 2;

  // animate
  candy.animate([
    { transform: "translate(0,0)", opacity: 1 },
    { transform: `translate(${targetX - startX}px, ${targetY - startY}px) scale(0.3)`, opacity: 0 }
  ], {
    duration: 600,
    easing: "ease-out"
  });

  // remove after animation
  setTimeout(() => candy.remove(), 600);
}

bucket.addEventListener("click", () => {
  count++;
  counter.textContent = count;

  // spawn MULTIPLE so you SEE it clearly
  for (let i = 0; i < 3; i++) {
    spawnCandy();
  }
});
</script>

</body>
</html>
